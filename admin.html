<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8b5e8f" />
  <title>RDV Beauté — Espace pro</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #fdf6f0;
      color: #2d2d2d;
      min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #c9a0dc 0%, #f4a7b9 60%, #ffd6c0 100%);
      padding: 28px 20px 18px;
      flex-shrink: 0;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 6px rgba(0,0,0,0.12);
    }
    .header-sub { font-size: 0.75rem; color: rgba(255,255,255,0.85); margin-top: 2px; }
    .logout-btn {
      position: absolute; top: 28px; right: 20px;
      background: rgba(255,255,255,0.25); border: none; color: white;
      padding: 6px 12px; border-radius: 20px; font-size: 0.72rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    /* LOGIN */
    .login-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: white; border-radius: 18px; padding: 32px 26px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 340px; text-align: center; }
    .login-emoji { font-size: 2.4rem; margin-bottom: 6px; }
    .login-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: #8b5e8f; margin-bottom: 18px; }
    .login-input {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #eee;
      font-size: 1rem; text-align: center; outline: none; margin-bottom: 12px;
      font-family: 'DM Sans', sans-serif;
    }
    .login-input:focus { border-color: #c9a0dc; }
    .login-error { color: #d65d5d; font-size: 0.78rem; margin-bottom: 10px; min-height: 16px; }
    .login-btn {
      width: 100%; padding: 12px; border-radius: 30px; border: none;
      background: linear-gradient(135deg, #c9a0dc, #f4a7b9); color: white;
      font-weight: 600; font-size: 0.92rem; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    /* TABS */
    .tabs { display: flex; gap: 6px; padding: 14px 16px 0; flex-shrink: 0; }
    .tab {
      flex: 1; text-align: center; padding: 10px 6px; border-radius: 12px;
      font-size: 0.78rem; font-weight: 500; color: #b89bb8; background: white;
      cursor: pointer; border: 2px solid transparent; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .tab.active { color: white; background: linear-gradient(135deg, #c9a0dc, #f4a7b9); border-color: transparent; }

    .content { flex: 1; overflow-y: auto; padding: 16px; }

    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600; color: #8b5e8f; margin-bottom: 12px; }
    .empty-msg { color: #bbb; font-size: 0.85rem; text-align: center; padding: 30px 10px; }

    /* RDV CARDS */
    .rdv-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 8px rgba(0,0,0,0.05); border-left: 4px solid #e0c8f0; }
    .rdv-card.confirme { border-left-color: #7fc28a; }
    .rdv-card.annule { border-left-color: #e08a8a; opacity: 0.6; }
    .rdv-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .rdv-name { font-weight: 600; font-size: 0.95rem; }
    .rdv-when { font-size: 0.8rem; color: #9b59b6; font-weight: 500; }
    .rdv-detail { font-size: 0.82rem; color: #777; margin-bottom: 2px; }
    .rdv-statut {
      font-size: 0.65rem; padding: 3px 9px; border-radius: 20px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap;
    }
    .rdv-statut.en_attente { background: #fff3cd; color: #8a6d00; }
    .rdv-statut.confirme { background: #e1f5e4; color: #2e7d4f; }
    .rdv-statut.annule { background: #fde2e2; color: #b03939; }
    .rdv-actions { display: flex; gap: 7px; margin-top: 10px; }
    .rdv-actions button {
      flex: 1; padding: 7px; border-radius: 20px; border: none; font-size: 0.75rem;
      font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-valider { background: #e1f5e4; color: #2e7d4f; }
    .btn-annuler { background: #fde2e2; color: #b03939; }
    .btn-suppr { background: #f0f0f0; color: #888; }

    /* SERVICES */
    .cat-block { background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
    .cat-block-title { font-weight: 600; font-size: 0.9rem; color: #8b5e8f; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .svc-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-top: 1px solid #f5f0f8; }
    .svc-row:first-of-type { border-top: none; }
    .svc-name { flex: 1; font-size: 0.85rem; }
    .svc-price-input {
      width: 78px; padding: 6px 8px; border-radius: 8px; border: 1.5px solid #eee;
      font-size: 0.82rem; text-align: right; font-family: 'DM Sans', sans-serif; outline: none;
    }
    .svc-price-input:focus { border-color: #c9a0dc; }
    .svc-del { background: none; border: none; color: #e0a0a0; font-size: 1rem; cursor: pointer; padding: 0 4px; }
    .add-svc-row { display: flex; gap: 6px; margin-top: 8px; }
    .add-svc-row input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 1.5px solid #eee; font-size: 0.82rem; outline: none; font-family: 'DM Sans', sans-serif; }
    .add-svc-row input:focus { border-color: #c9a0dc; }
    .add-svc-row button { padding: 8px 14px; border-radius: 8px; border: none; background: #c9a0dc; color: white; font-size: 0.8rem; cursor: pointer; }

    /* DISPO — calendrier annuel */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
    .cal-nav-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none; background: white;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08); color: #8b5e8f; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cal-nav-month { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600; color: #8b5e8f; text-align: center; flex: 1; }
    .legend-row { display: flex; gap: 14px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #999; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

    .month-grid { background: white; border-radius: 16px; padding: 14px; box-shadow: 0 1px 8px rgba(0,0,0,0.05); margin-bottom: 16px; }
    .wk-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
    .wk-dname { font-size: 0.62rem; color: #bbb; text-align: center; text-transform: uppercase; letter-spacing: 0.03em; }
    .wk-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-cell {
      aspect-ratio: 1; border-radius: 10px; padding: 4px 3px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      border: 2px solid transparent; background: #faf7fb; position: relative;
    }
    .day-cell.empty { background: none; cursor: default; }
    .day-cell.sel { border-color: #c9a0dc; background: #fdf3ff; }
    .day-cell .dn { font-size: 0.78rem; font-weight: 500; color: #555; margin-bottom: 2px; }
    .day-cell.closed .dn { color: #ccc; text-decoration: line-through; }
    .dot-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
    .mini-dot { width: 5px; height: 5px; border-radius: 50%; background: #c9a0dc; }
    .mini-dot.off { background: #e8e0ec; }

    .day-editor { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
    .day-editor-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: #8b5e8f; margin-bottom: 4px; }
    .day-editor-sub { font-size: 0.75rem; color: #aaa; margin-bottom: 14px; }
    .slot-toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
    .slot-toggle {
      padding: 13px 10px; border-radius: 12px; border: 2px solid #eee; background: #fafafa;
      text-align: center; cursor: pointer; font-size: 0.92rem; font-weight: 500; color: #999;
      transition: all 0.15s;
    }
    .slot-toggle.on { border-color: #c9a0dc; background: #fdf3ff; color: #7c3aed; font-weight: 600; }
    .close-day-btn {
      width: 100%; padding: 11px; border-radius: 12px; border: 1.5px solid #eee; background: white;
      color: #999; font-size: 0.82rem; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 8px;
    }
    .close-day-btn.is-closed { border-color: #e08a8a; color: #b03939; background: #fdf2f2; }
    .apply-week-btn {
      width: 100%; padding: 11px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #c9a0dc, #f4a7b9); color: white;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .editor-hint { font-size: 0.72rem; color: #bbb; text-align: center; margin-top: 10px; line-height: 1.5; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #2d2d2d; color: white; padding: 10px 20px; border-radius: 30px;
      font-size: 0.82rem; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 100;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ADMIN_PASSWORD = "linstantk2026";

const DEFAULT_CATS = [
  { id:"manucure", label:"Manucure", icon:"💅", items:[

    {id:"e5",label:"Jambes entières",prix:28},
    {id:"e6",label:"Maillot échancré",prix:25},
    {id:"e7",label:"Maillot intégral",prix:30},
    {id:"e8",label:"Vajacial seul",prix:40},
    {id:"e9",label:"Interfessier",prix:5},
    {id:"e10",label:"Épilation intégral + vajacial",prix:60},
    {id:"e11",label:"PACK Aiselle + Demi-jambes + Maillot intégral 🆕",prix:50},
  ]},
  { id:"massage", label:"Massage", icon:"💆", items:[
    {id:"mg1",label:"Massage relaxant corps entier (45min–1h)",prix:60},
  ]},
];

// Les 4 créneaux fixes du planning de base
const SLOTS_BASE = ["8h00","11h00","14h00","17h00"];

const MOIS_NOMS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const WK_NOMS = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

function dateKey(y,m,d) {
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}
function daysInMonth(y,m) { return new Date(y, m+1, 0).getDate(); }
function firstWeekdayOfMonth(y,m) {
  // 0 = lundi ... 6 = dimanche
  const jsDay = new Date(y, m, 1).getDay(); // 0=dimanche
  return (jsDay + 6) % 7;
}
function load(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}

function Toast({ msg }) {
  if (!msg) return null;
  return <div className="toast">{msg}</div>;
}

function LoginScreen({ onLogin }) {
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState("");

  function tryLogin() {
    if (pwd === ADMIN_PASSWORD) { onLogin(); }
    else { setErr("Mot de passe incorrect"); }
  }

  return (
    <div className="login-screen">
      <div className="login-box">
        <div className="login-emoji">🔐</div>
        <div className="login-title">Espace pro</div>
        <input
          className="login-input" type="password" placeholder="Mot de passe"
          value={pwd}
          onChange={e=>{setPwd(e.target.value); setErr("");}}
          onKeyDown={e=>{if(e.key==="Enter") tryLogin();}}
          autoFocus
        />
        <div className="login-error">{err}</div>
        <button className="login-btn" onClick={tryLogin}>Se connecter</button>
      </div>
    </div>
  );
}

function RdvTab({ showToast }) {
  const [list, setList] = useState(()=>load("rdv_beaute_liste", []));
  const [filter, setFilter] = useState("tous");

  function update(id, patch) {
    const next = list.map(r=> r.id===id ? {...r, ...patch} : r);
    setList(next); save("rdv_beaute_liste", next);
  }
  function remove(id) {
    const next = list.filter(r=>r.id!==id);
    setList(next); save("rdv_beaute_liste", next);
    showToast("Rendez-vous supprimé");
  }

  const filtered = list
    .filter(r => filter==="tous" || r.statut===filter)
    .sort((a,b)=> (a.jour||0)-(b.jour||0));

  return (
    <div>
      <div className="section-title">Rendez-vous</div>
      <div className="tabs" style={{padding:0, marginBottom:12}}>
        {["tous","en_attente","confirme","annule"].map(f=>(
          <div key={f} className={`tab ${filter===f?"active":""}`} onClick={()=>setFilter(f)} style={{fontSize:"0.7rem"}}>
            {f==="tous"?"Tous":f==="en_attente"?"En attente":f==="confirme"?"Confirmés":"Annulés"}
          </div>
        ))}
      </div>

      {filtered.length===0 && <div className="empty-msg">Aucun rendez-vous pour le moment.</div>}

      {filtered.map(r=>(
        <div key={r.id} className={`rdv-card ${r.statut}`}>
          <div className="rdv-top">
            <div>
              <div className="rdv-name">{r.prenom} {r.nom}</div>
              <div className="rdv-when">{r.jour} juillet · {r.creneau}</div>
            </div>
            <span className={`rdv-statut ${r.statut}`}>
              {r.statut==="en_attente"?"En attente":r.statut==="confirme"?"Confirmé":"Annulé"}
            </span>
          </div>
          <div className="rdv-detail">💅 {r.prestation} — {r.prix}</div>
          <div className="rdv-detail">📞 {r.tel}</div>
          <div className="rdv-actions">
            {r.statut!=="confirme" && <button className="btn-valider" onClick={()=>update(r.id,{statut:"confirme"})}>✓ Valider</button>}
            {r.statut!=="annule" && <button className="btn-annuler" onClick={()=>update(r.id,{statut:"annule"})}>✕ Annuler</button>}
            <button className="btn-suppr" onClick={()=>remove(r.id)}>🗑</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function ServicesTab({ showToast }) {
  const [cats, setCats] = useState(()=>load("rdv_beaute_services", DEFAULT_CATS));
  const [newNames, setNewNames] = useState({});

  function persist(next) { setCats(next); save("rdv_beaute_services", next); }

  function updatePrice(catId, itemId, val) {
    const next = cats.map(c=>{
      if (c.id!==catId) return c;
      return {...c, items: c.items.map(it=> it.id===itemId ? {...it, prix: val===""?null:val} : it)};
    });
    persist(next);
  }
  function removeItem(catId, itemId) {
    const next = cats.map(c=>{
      if (c.id!==catId) return c;
      return {...c, items: c.items.filter(it=>it.id!==itemId)};
    });
    persist(next);
    showToast("Prestation supprimée");
  }
  function addItem(catId) {
    const name = (newNames[catId]||"").trim();
    if (!name) return;
    const next = cats.map(c=>{
      if (c.id!==catId) return c;
      const id = catId+"_"+Date.now();
      return {...c, items: [...c.items, {id, label:name, prix:null}]};
    });
    persist(next);
    setNewNames({...newNames, [catId]: ""});
    showToast("Prestation ajoutée");
  }

  return (
    <div>
      <div className="section-title">Services & tarifs</div>
      {cats.map(cat=>(
        <div key={cat.id} className="cat-block">
          <div className="cat-block-title"><span>{cat.icon}</span><span>{cat.label}</span></div>
          {cat.items.map(it=>(
            <div key={it.id} className="svc-row">
              <span className="svc-name">{it.label}</span>
              <input
                className="svc-price-input" type="text" placeholder="Prix"
                value={it.prix===null?"":it.prix}
                onChange={e=>updatePrice(cat.id, it.id, e.target.value)}
              />
              <button className="svc-del" onClick={()=>removeItem(cat.id, it.id)}>✕</button>
            </div>
          ))}
          <div className="add-svc-row">
            <input
              type="text" placeholder="Nouvelle prestation..."
              value={newNames[cat.id]||""}
              onChange={e=>setNewNames({...newNames, [cat.id]: e.target.value})}
              onKeyDown={e=>{if(e.key==="Enter") addItem(cat.id);}}
            />
            <button onClick={()=>addItem(cat.id)}>Ajouter</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function DispoTab({ showToast }) {
  // dispo: { "2026-07-15": ["8h00","14h00"], ... } — clé absente = jour ouvert avec planning de base, [] = jour fermé
  const [dispo, setDispo] = useState(()=>load("rdv_beaute_dispo_v2", {}));
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selDate, setSelDate] = useState(null);

  function persist(next) { setDispo(next); save("rdv_beaute_dispo_v2", next); }

  function getSlotsFor(key) {
    if (dispo.hasOwnProperty(key)) return dispo[key];
    return SLOTS_BASE.slice(); // planning de base par défaut
  }

  function toggleSlot(key, slot) {
    const current = getSlotsFor(key);
    const next = current.includes(slot) ? current.filter(s=>s!==slot) : [...current, slot];
    persist({...dispo, [key]: next});
  }
  function toggleClosed(key) {
    const isClosed = getSlotsFor(key).length === 0;
    persist({...dispo, [key]: isClosed ? SLOTS_BASE.slice() : []});
    showToast(isClosed ? "Jour rouvert" : "Jour fermé");
  }
  function applyToWeek(key) {
    const slots = getSlotsFor(key);
    const d = new Date(key);
    const wd = (d.getDay()+6)%7; // 0=lundi
    const monday = new Date(d);
    monday.setDate(d.getDate()-wd);
    const next = {...dispo};
    for (let i=0;i<7;i++){
      const dd = new Date(monday);
      dd.setDate(monday.getDate()+i);
      next[dateKey(dd.getFullYear(),dd.getMonth(),dd.getDate())] = slots.slice();
    }
    persist(next);
    showToast("Appliqué à toute la semaine");
  }

  function prevMonth() {
    if (viewMonth===0) { setViewMonth(11); setViewYear(viewYear-1); }
    else setViewMonth(viewMonth-1);
  }
  function nextMonth() {
    if (viewMonth===11) { setViewMonth(0); setViewYear(viewYear+1); }
    else setViewMonth(viewMonth+1);
  }

  const nbDays = daysInMonth(viewYear, viewMonth);
  const firstWd = firstWeekdayOfMonth(viewYear, viewMonth);
  const cells = [];
  for (let i=0;i<firstWd;i++) cells.push(null);
  for (let d=1; d<=nbDays; d++) cells.push(d);

  const selKey = selDate ? dateKey(viewYear, viewMonth, selDate) : null;
  const selSlots = selKey ? getSlotsFor(selKey) : [];
  const selClosed = selSlots.length === 0;

  return (
    <div>
      <div className="section-title">Disponibilités</div>

      <div className="cal-nav">
        <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
        <div className="cal-nav-month">{MOIS_NOMS[viewMonth]} {viewYear}</div>
        <button className="cal-nav-btn" onClick={nextMonth}>›</button>
      </div>

      <div className="legend-row">
        <div className="legend-item"><span className="legend-dot" style={{background:"#c9a0dc"}}></span>Créneau ouvert</div>
        <div className="legend-item"><span className="legend-dot" style={{background:"#e8e0ec"}}></span>Créneau fermé</div>
      </div>

      <div className="month-grid">
        <div className="wk-header">{WK_NOMS.map(w=><div key={w} className="wk-dname">{w}</div>)}</div>
        <div className="wk-grid">
          {cells.map((d,idx)=>{
            if (!d) return <div key={idx} className="day-cell empty"/>;
            const key = dateKey(viewYear, viewMonth, d);
            const slots = getSlotsFor(key);
            const closed = slots.length===0;
            return (
              <div key={d}
                className={`day-cell ${selKey===key?"sel":""} ${closed?"closed":""}`}
                onClick={()=>setSelDate(d)}
              >
                <span className="dn">{d}</span>
                <div className="dot-row">
                  {SLOTS_BASE.map(s=>(
                    <span key={s} className={`mini-dot ${slots.includes(s)?"":"off"}`}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {selDate && (
        <div className="day-editor">
          <div className="day-editor-title">{selDate} {MOIS_NOMS[viewMonth]} {viewYear}</div>
          <div className="day-editor-sub">{selClosed ? "Jour fermé" : `${selSlots.length} créneau${selSlots.length>1?"x":""} ouvert${selSlots.length>1?"s":""}`}</div>

          <div className="slot-toggle-grid">
            {SLOTS_BASE.map(s=>(
              <div key={s}
                className={`slot-toggle ${selSlots.includes(s)?"on":""}`}
                onClick={()=>toggleSlot(selKey, s)}
              >
                {s}
              </div>
            ))}
          </div>

          <button className={`close-day-btn ${selClosed?"is-closed":""}`} onClick={()=>toggleClosed(selKey)}>
            {selClosed ? "↺ Rouvrir ce jour" : "Fermer ce jour"}
          </button>
          <button className="apply-week-btn" onClick={()=>applyToWeek(selKey)}>Appliquer ces horaires à toute la semaine</button>

          <div className="editor-hint">Touchez un créneau pour l'activer ou le désactiver. Les changements sont enregistrés automatiquement.</div>
        </div>
      )}
    </div>
  );
}

function Dashboard({ onLogout }) {
  const [tab, setTab] = useState("rdv");
  const [toast, setToast] = useState("");

  function showToast(msg) {
    setToast(msg);
    setTimeout(()=>setToast(""), 2200);
  }

  return (
    <div className="wrap">
      <div className="header" style={{position:"relative"}}>
        <div className="header-title">💅 Espace pro</div>
        <div className="header-sub">RDV Beauté · Gestion</div>
        <button className="logout-btn" onClick={onLogout}>Déconnexion</button>
      </div>
      <div className="tabs">
        <div className={`tab ${tab==="rdv"?"active":""}`} onClick={()=>setTab("rdv")}>📅 Rendez-vous</div>
        <div className={`tab ${tab==="services"?"active":""}`} onClick={()=>setTab("services")}>💅 Services</div>
        <div className={`tab ${tab==="dispo"?"active":""}`} onClick={()=>setTab("dispo")}>🗓 Disponibilités</div>
      </div>
      <div className="content">
        {tab==="rdv" && <RdvTab showToast={showToast} />}
        {tab==="services" && <ServicesTab showToast={showToast} />}
        {tab==="dispo" && <DispoTab showToast={showToast} />}
      </div>
      <Toast msg={toast} />
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(()=> sessionStorage.getItem("rdv_admin_auth")==="1");

  function handleLogin() {
    sessionStorage.setItem("rdv_admin_auth","1");
    setAuthed(true);
  }
  function handleLogout() {
    sessionStorage.removeItem("rdv_admin_auth");
    setAuthed(false);
  }

  if (!authed) return <LoginScreen onLogin={handleLogin} />;
  return <Dashboard onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
